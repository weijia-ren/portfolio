<div class="plot-card">
  <svg class="case-study-plot framework-plot" viewBox="0 0 960 420" role="img" aria-labelledby="framework-title framework-desc">
    <title id="framework-title">Search quality UXR framework</title>
    <desc id="framework-desc">A high-level framework diagram showing search quality at the center with four surrounding dimensions: discovery, relevance, freshness and relatability, and experience quality.</desc>
    <rect x="0" y="0" width="960" height="420" rx="18" fill="#ffffff"></rect>

    <defs>
      <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
      </filter>
    </defs>

    <g stroke="#cbd5e1" stroke-width="2">
      <line x1="480" y1="210" x2="220" y2="118"></line>
      <line x1="480" y1="210" x2="740" y2="118"></line>
      <line x1="480" y1="210" x2="220" y2="302"></line>
      <line x1="480" y1="210" x2="740" y2="302"></line>
    </g>

    <g filter="url(#softShadow)">
      <rect x="96" y="76" width="248" height="108" rx="18" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"></rect>
      <rect x="616" y="76" width="248" height="108" rx="18" fill="#f0f9ff" stroke="#3b82f6" stroke-width="2"></rect>
      <rect x="96" y="236" width="248" height="108" rx="18" fill="#fdf4ff" stroke="#d946ef" stroke-width="2"></rect>
      <rect x="616" y="236" width="248" height="108" rx="18" fill="#fefce8" stroke="#eab308" stroke-width="2"></rect>
      <circle cx="480" cy="210" r="92" fill="#111827"></circle>
    </g>

    <g fill="#ffffff" font-family="Inter, system-ui, sans-serif">
      <text x="480" y="196" text-anchor="middle" font-size="18" font-weight="700">Search Quality</text>
      <text x="480" y="220" text-anchor="middle" font-size="12" opacity="0.92">UXR framework</text>
    </g>

    <g fill="#111827" font-family="Inter, system-ui, sans-serif">
      <text x="220" y="112" text-anchor="middle" font-size="16" font-weight="700">Discovery</text>
      <text x="220" y="136" text-anchor="middle" font-size="12" fill="#334155">Finding new / useful content</text>

      <text x="740" y="112" text-anchor="middle" font-size="16" font-weight="700">Relevance</text>
      <text x="740" y="136" text-anchor="middle" font-size="12" fill="#334155">Matching intent and query</text>

      <text x="220" y="272" text-anchor="middle" font-size="16" font-weight="700">Freshness &amp; Relatability</text>
      <text x="220" y="296" text-anchor="middle" font-size="12" fill="#334155">Current, timely, or context-aware results</text>

      <text x="740" y="272" text-anchor="middle" font-size="16" font-weight="700">Experience Quality</text>
      <text x="740" y="296" text-anchor="middle" font-size="12" fill="#334155">Ease of search and result presentation</text>
    </g>
  </svg>
  <div class="plot-legend framework-legend">
    <span><strong>Discovery</strong> finding new or useful content</span>
    <span><strong>Relevance</strong> matching the user’s query and intent</span>
    <span><strong>Freshness / Relatability</strong> current, timely, or context-aware results</span>
    <span><strong>Experience Quality</strong> the usability of the search journey and result view</span>
  </div>
</div>
